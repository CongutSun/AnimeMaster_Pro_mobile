name: animemaster
description: "A new Flutter project."
publish_to: 'none'

version: 1.1.2+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  html: ^0.15.6
  dart_rss: 3.0.3
  shared_preferences: ^2.5.5
  provider: ^6.1.5+1
  dio: ^5.9.2
  image_picker: ^1.2.1
  image_cropper: ^12.1.1
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.1
  shorebird_code_push: ^2.0.5
  cached_network_image: ^3.4.1
  flutter_secure_storage: ^10.0.0
  flutter_cache_manager: ^3.3.2
  webdav_client: ^1.2.2
  
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.4
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: 0.14.4

flutter:
  uses-material-design: true
  assets:
    - shorebird.yaml

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"